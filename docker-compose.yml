services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: rag_app
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: ./apps/api
    env_file:
      - .env
    volumes:
      - ./apps/api/app:/app/app
      - ./apps/api/uploads:/app/uploads
    ports:
      - "8000:8000"
    depends_on:
      - db

  web:
    build: ./apps/web
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    volumes:
      - ./apps/web:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  pgdata:
